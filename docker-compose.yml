services:
  db:
    image: mysql:8.0
    container_name: ehunting_db
    restart: always
    environment:
      MYSQL_DATABASE: ehuntin_devwp
      MYSQL_USER: ehuntin_devwpus
      MYSQL_PASSWORD: devwpus
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    container_name: ehunting_wordpress
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ehuntin_devwp
      WORDPRESS_DB_USER: ehuntin_devwpus
      WORDPRESS_DB_PASSWORD: devwpus
    volumes:
      - ./:/var/www/html

volumes:
  db_data: